services:
  web:
    image: rensa-web:dev
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_ELYSIA_WS_URL: ${NEXT_PUBLIC_ELYSIA_WS_URL:-ws://localhost:3002}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NEXT_PUBLIC_EXPLORE_SOURCE: ${NEXT_PUBLIC_EXPLORE_SOURCE:-database}
    ports:
      - "3000:3000"
    env_file:
      - ./apps/web/.env.local
    environment:
      ELYSIA_BASE_URL: http://notifications:3002/api
      FAST_API_BASE_URL: http://ai:3001/api
      EXPRESS_BASE_URL: http://exif:3003/api
      REDIS_URL: redis://redis:6379
    depends_on:
      notifications:
        condition: service_started
      ai:
        condition: service_started
      exif:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rensa-net

  notifications:
    image: rensa-notifications:dev
    build:
      context: .
      dockerfile: apps/notifications/Dockerfile
      target: dev
    ports:
      - "3002:3002"
    env_file:
      - ./apps/notifications/.env.local
    environment:
      PORT: 3002
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rensa-net

  ai:
    image: rensa-ai:dev
    build:
      context: ./apps/ai
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3001:3001"
    restart: unless-stopped
    networks:
      - rensa-net

  exif:
    image: rensa-exif:dev
    build:
      context: ./apps/exif
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3003:3003"
    env_file:
      - ./apps/exif/.env.local
    environment:
      PORT: 3003
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rensa-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - rensa-net

networks:
  rensa-net:
    driver: bridge

volumes:
  redis-data:
