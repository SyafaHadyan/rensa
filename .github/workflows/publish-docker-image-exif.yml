name: publish-docker-image-exif

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: |
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "ts=$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64
          context: apps/exif/
          file: apps/exif/Dockerfile
          push: true
          tags: |
            labmgm/rensa-exif:${{ inputs.tag }}
            labmgm/rensa-exif:${{ inputs.tag }}-${{ steps.meta.outputs.ts }}
            labmgm/rensa-exif:${{ inputs.tag }}-${{ steps.meta.outputs.sha }}
